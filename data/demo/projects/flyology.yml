# At age 12, Ada methodically researched flight. She investigated wing materials
# (paper, oilsilk, wires, feathers), studied bird anatomy for wing-to-body proportions,
# planned to write a book called "Flyology" with illustrated plates, and envisioned
# integrating steam power with flight. She even planned compass-based navigation
# for cross-country routes over mountains and rivers.

name: "Flyology: A Study of Mechanical Flight"
description: >-
  Independent research project conducted at age 12 investigating the mechanics of
