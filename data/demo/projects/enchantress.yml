bullets:
  - Collaborated with Charles Babbage for nearly two decades on the Analytical Engine, contributing analysis, documentation, and debugging of the machine's instruction sequences.
  - Produced the only comprehensive published description of the Engine's computational model, bridging Babbage's mechanical vision with a formal logical framework.
  - Advocated for the Engine's potential to government sponsors and academic audiences, translating complex technical concepts for non-technical stakeholders.
  - Earned the title "The Enchantress of Numbers" from Babbage for analytical brilliance and the ability to distill his scattered ideas into clear, publishable exposition.
