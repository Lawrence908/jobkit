# Ada's collaboration with Babbage on the Analytical Engine spanned nearly two decades.
# Babbage called her "The Enchantress of Numbers" for her analytical brilliance. She
# visited his workshops, attended his Saturday soirées, and maintained extensive
# correspondence about the Engine's design. She was introduced to Babbage by Mary
# Somerville, the noted mathematician, in June 1833.

name: "Analytical Engine Collaboration"
description: >-
  Long-running collaboration with Charles Babbage on the design and documentation
  of the Analytical Engine — the first Turing-complete general-purpose computer design.
  Contributed the definitive published analysis of the Engine's capabilities, debugged
  instruction sequences, and advocated for the machine's potential to government and
  academic audiences. Maintained extensive correspondence on architecture, instruction
  design, and applications.
