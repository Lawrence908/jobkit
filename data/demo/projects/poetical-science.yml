bullets:
  - Articulated the first vision of general-purpose computing, arguing the Analytical Engine could process music, text, and logic — any domain whose relationships can be expressed formally.
  - Wrote that the Engine "might compose elaborate and scientific pieces of music of any degree of complexity," anticipating algorithmic composition by over a century.
  - Proposed a "calculus of the nervous system" — a mathematical model for how brains give rise to thoughts and nerves to feelings — an early concept of computational neuroscience.
  - Established the philosophical position that machines cannot originate thought ("The Engine has no pretensions to originate anything"), later debated by Alan Turing in his 1950 paper on machine intelligence.
