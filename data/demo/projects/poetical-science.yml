# Ada's key insight was that the Analytical Engine could process symbols beyond
# numbers — music, text, logic. She wrote: "The engine might compose elaborate
# and scientific pieces of music of any degree of complexity or extent." She
# called her approach "poetical science," integrating imagination with mathematics.
# She also explored a "calculus of the nervous system" — a mathematical model
# for how the brain gives rise to thoughts.

name: "Poetical Science: Computing Beyond Calculation"
description: >-
  Theoretical framework arguing that computing machines could manipulate any symbols
  whose relationships can be expressed formally — not just numbers but music, text,
  and logic. First articulation of general-purpose computing, a century before
  modern computers existed. Also explored early concepts of computational neuroscience,
  proposing a "calculus of the nervous system" to model how brains produce thoughts.
