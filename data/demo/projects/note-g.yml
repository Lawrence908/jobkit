bullets:
  - Designed a complete algorithm for computing Bernoulli numbers on the Analytical Engine, including variable cards, operation cards, and loop sequencing — the first published computer program.
  - Translated Luigi Menabrea's French paper on the Analytical Engine into English, then supplemented it with seven original notes (A–G) totaling three times the length of the source material.
  - Identified and corrected a critical error in Babbage's own draft of the Bernoulli computation, demonstrating independent mastery of the Engine's instruction model.
  - Distinguished between the Engine's mechanical layer and its logical architecture, establishing a separation of concerns that anticipated modern software engineering principles.
